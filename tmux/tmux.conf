set -g prefix C-j
unbind C-b

set -g mouse on
set -g escape-time 0

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind \\ split-window -h -c "#{pane_current_path}"
bind -  split-window -v -c "#{pane_current_path}"

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r C-h previous-window
bind -r C-l next-window

# status bar
set -g status-position top
set -g status-style "bg=colour234,fg=colour250"
set -g window-status-current-style "fg=green,bold"

# copy/paste
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
set -s set-clipboard off
if-shell -b 'grep -qi microsoft /proc/sys/kernel/osrelease' \
    'set -s copy-command "clip.exe"' \
    'set -s copy-command "xsel --clipboard --input"'
